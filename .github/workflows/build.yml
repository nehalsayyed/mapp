name: Build Minimized Capacitor APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Create Capacitor App
        run: |
          mkdir app
          cd app

          npm init -y

          npm install @capacitor/core @capacitor/cli @capacitor/android

          mkdir www
          cat > www/index.html <<EOF
          <!doctype html>
          <html>
          <body>Hello</body>
          </html>
          EOF

          npx cap init MyApp com.example.myapp --web-dir=www
          npx cap add android

      - name: Enable Release Optimization
        run: |
          FILE=app/android/app/build.gradle

          sed -i 's/minifyEnabled false/minifyEnabled true/g' "$FILE" || true
          sed -i 's/shrinkResources false/shrinkResources true/g' "$FILE" || true

          grep -q "shrinkResources" "$FILE" || \
          sed -i '/minifyEnabled true/a\            shrinkResources true' "$FILE"

          grep -q "proguard-android-optimize.txt" "$FILE" || \
          sed -i 's/proguard-android.txt/proguard-android-optimize.txt/g' "$FILE"

      - name: Build Release APK
        working-directory: app/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: minimized-apk
          path: app/android/app/build/outputs/apk/release/*.apk
          
