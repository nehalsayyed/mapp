name: Build Android APK From Single File
on:
  workflow_dispatch: # Allows you to trigger the build manually from the GitHub website

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout single file repo
        uses: actions/checkout@v4

      - name: Set up Go environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Resolve dependencies and install toolchain
        run: |
          # 1. Initialize Go module environment inside the virtual machine
          go mod init myapp
          
          # 2. Add Raylib and Fyne UI bindings
          go get github.com/gen2brain/raylib-go/raylib
          go get fyne.io/fyne/v2
          go mod tidy
          
          # 3. Install the correct standalone cross-compilation package
          go install github.com/fyne-io/fyne-cross@latest

      - name: Generate placeholder app icon dynamically
        run: |
          # Fyne requires a target app icon to package binaries.
          # This creates a solid pixel PNG so your root directory stays completely clean.
          echo -n "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=" | base64 --decode > icon.png

      - name: Run Docker Cross-Compilation
        run: |
          # fyne-cross executes inside pre-configured Docker containers under the hood.
          # We pass '--no-cache' to ensure a lean execution inside the runner's storage space.
          ~/go/bin/fyne-cross android -app-id com.example.singlefile -icon icon.png --no-cache

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: native-android-app
          path: fyne-cross/dist/android/*.apk
          
