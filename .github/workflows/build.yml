name: Build JS APK
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Fixed: Uses $GITHUB_WORKSPACE to accurately locate your root index.html file
      - name: Package Application
        run: |
          mkdir ../wrapper && cd ../wrapper
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "My Single File App" "com.singlefile.jsapp" --web-dir="$GITHUB_WORKSPACE"
          npx cap add android
          npx cap sync android

      - name: Set up Java Environment
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK via Gradle
        run: |
          cd ../wrapper/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: finished-android-app
          path: ../wrapper/android/app/build/outputs/apk/debug/*.apk
          
