name: Build Native Android APK
on: workflow_dispatch

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout single file repo
        uses: actions/checkout@v4

      - name: Set up Go environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Set up Java & Android NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK toolchain component
        run: |
          sdkmanager "ndk;25.2.9519653"
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Resolve dependencies and compile APK dynamically
        run: |
          # Dynamically turn the single file into a buildable module inside the runner env
          go mod init myapp
          go get github.com/gen2brain/raylib-go/raylib
          
          # Install the tool that wraps Go into native android builds without keeping project boilerplate
          go install github.com/fyne-io/fyne/v2/cmd/fyne-cross@latest
          
          # Execute the compilation targeting android
          fyne-cross android -app-id com.example.singlefile -icon icon.png
          
      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: native-app.apk
          path: fyne-cross/dist/android/*.apk
          
