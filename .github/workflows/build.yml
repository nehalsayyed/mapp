name: Build Android APK From Single File
on:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout single file repo
        uses: actions/checkout@v4

      # 1. Use 'stable' to automatically satisfy the Go 1.24+ requirement
      - name: Set up Go environment
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Set up Java & Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;25.2.9519653"
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Compile Pure Go APK
        run: |
          # Initialize environment
          go mod init myapp
          go get github.com/hajimehoshi/ebiten/v2
          go mod tidy
          
          # Install the compiler
          go install github.com/hajimehoshi/ebiten/v2/cmd/ebitenmobile@latest
          
          # ONLY run the build command (bind is what crashed your main package)
          ~/go/bin/ebitenmobile build -target android -javapkg com.example.singlefile -o output-app.apk .

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: pure-go-android-app
          path: output-app.apk
          
