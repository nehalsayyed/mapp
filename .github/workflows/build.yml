name: Build Signed Minimized Production APK
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js Engine
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 1. Initialize Capacitor and sync project files
      - name: Bootstrap Capacitor Architecture
        run: |
          mkdir ../wrapper && cd ../wrapper
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "Min App" "com.production.minapp" --web-dir="$GITHUB_WORKSPACE"
          npx cap add android
          npx cap sync android

      # 2. Inject code minification & resource shrinking configurations
      - name: Force Code and Resource Minification
        run: |
          GRADLE_FILE="../wrapper/android/app/build.gradle"
          sed -i '/buildTypes {/,/}/ {
            /release {/!b
            :a; n; /}/!ba
            i \            minifyEnabled true\n            shrinkResources true\n            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
          }' "$GRADLE_FILE"

      # 3. Handle dependency convergence with modern Java 21 engine
      - name: Set up Java Environment
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 4. Compile the application using the highly optimized release parameters
      - name: Run Production Compiler
        run: |
          cd ../wrapper/android
          chmod +x gradlew
          ./gradlew assembleRelease

      # 5. Automatically create a key and sign the APK for immediate installation
      - name: Sign Production APK
        uses: ridedott/android-sign-action@v1
        id: sign_app
        with:
          releaseDirectory: ../wrapper/android/app/build/outputs/apk/release
          signingKeyBase64: '' # Leaving empty makes the action auto-generate a secure debugging release key
          alias: mykeyalias
          keyStorePassword: mykeystorepassword
          keyPassword: mykeypassword

      # 6. Extract the signed, optimized target asset
      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: signed-release-apk
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}
          
